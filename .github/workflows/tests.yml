name: Selenium Test Suite

on:
  push:
    branches: [ main ]

jobs:
  test-success:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run Success Test
        run: mvn clean test -Dtest=LoginTest#testSuccessfulLogin

  test-fail:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run Fail Test
        run: mvn clean test -Dtest=LoginTest#testFailLogin